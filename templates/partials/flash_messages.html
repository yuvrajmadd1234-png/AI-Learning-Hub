{% with messages = get_flashed_messages(with_categories=true) %}

{% if messages %}

<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;">

{% for category,message in messages %}

<div class="toast align-items-center text-bg-{% if category=='success' %}success{% elif category=='danger' %}danger{% elif category=='warning' %}warning{% else %}primary{% endif %} border-0 mb-3"
     role="alert"
     data-bs-delay="3000">

<div class="d-flex">

<div class="toast-body">

{{ message }}

</div>

<button type="button"
        class="btn-close btn-close-white me-2 m-auto"
        data-bs-dismiss="toast">
</button>

</div>

</div>

{% endfor %}

</div>

{% endif %}

{% endwith %}
