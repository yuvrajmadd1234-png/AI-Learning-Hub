{% extends "layouts/base.html" %}

{% block title %}
Edit Course
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        ✏️ Edit Course
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Course Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                value="{{ course.course }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <input
                                type="text"
                                name="category"
                                class="form-control"
                                value="{{ course.category }}"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Rating
                            </label>

                            <input
                                type="number"
                                step="0.1"
                                min="0"
                                max="5"
                                name="rating"
                                class="form-control"
                                value="{{ course.rating }}"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Level
                            </label>

                            <select
                                name="level"
                                class="form-select"
                                required>

                                <option value="Beginner"
                                {% if course.level=="Beginner" %}selected{% endif %}>
                                    Beginner
                                </option>

                                <option value="Intermediate"
                                {% if course.level=="Intermediate" %}selected{% endif %}>
                                    Intermediate
                                </option>

                                <option value="Advanced"
                                {% if course.level=="Advanced" %}selected{% endif %}>
                                    Advanced
                                </option>

                            </select>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            <i class="bi bi-save-fill"></i>

                            Update Course

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <a href="{{ url_for('courses.courses') }}"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>

                            Back to Courses

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
