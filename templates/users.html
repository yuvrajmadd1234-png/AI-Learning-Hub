<!DOCTYPE html>
<html>
<head>
    <title>Registered Users</title>
</head>
<body>

<h1>Registered Users</h1>

<table border="1" cellpadding="10">

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Email</th>
</tr>

{% for user in users %}

<tr>
    <td>{{ user.id }}</td>
    <td>{{ user.name }}</td>
    <td>{{ user.email }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
