<!DOCTYPE html>
<html>

<head>

    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">
        👨‍💼 Admin Panel
    </h1>

    <div class="card shadow p-4">

        <form action="/add_course" method="POST">

            <input class="form-control mb-3" name="course" placeholder="Course Name" required>

            <input class="form-control mb-3" name="category" placeholder="Category" required>

            <textarea class="form-control mb-3"
                      name="description"
                      placeholder="Description"
                      required></textarea>

            <input class="form-control mb-3" name="level" placeholder="Level" required>

            <input class="form-control mb-3" name="duration" placeholder="Duration" required>

            <input class="form-control mb-3" name="rating" placeholder="Rating" required>

            <button class="btn btn-success w-100">
                ➕ Add Course
            </button>

        </form>

    </div>

</div>

</body>
</html>
