<!DOCTYPE html>
<html>

<head>
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-5">
        👨‍💼 Admin Dashboard
    </h1>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h2>👥</h2>
                <h3>{{ total_users }}</h3>
                <p>Total Users</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h2>📚</h2>
                <h3>{{ total_courses }}</h3>
                <p>Total Courses</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow text-center p-4">
                <h2>⭐</h2>
                <h3>{{ average_rating }}</h3>
                <p>Average Rating</p>
            </div>
        </div>

    </div>

    <hr class="my-5">

    <div class="d-grid gap-3">
        
        <a href="/add_course" class="btn btn-warning">
            ➕ Add Course
        </a>
        <a href="/users" class="btn btn-primary">
            👥 Manage Users
        </a>

        <a href="/courses" class="btn btn-success">
            📚 Manage Courses
        </a>

        <a href="/dashboard" class="btn btn-secondary">
            🏠 Back to Dashboard
        </a>

    </div>

</div>

</body>
</html>
