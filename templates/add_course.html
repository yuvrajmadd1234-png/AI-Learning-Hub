{% extends "layouts/base.html" %}

{% block title %}
Add Course
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-6">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body p-5">

                    <h2 class="text-center mb-4">
                        ➕ Add New Course
                    </h2>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label">
                                Course Name
                            </label>

                            <input
                                type="text"
                                name="name"
                                class="form-control"
                                placeholder="Course Name"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Category
                            </label>

                            <input
                                type="text"
                                name="category"
                                class="form-control"
                                placeholder="Category"
                                required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Rating
                            </label>

                            <input
                            type="number"
                            step="0.1"
                            min="0"
                            max="5"
                            name="rating"
                            class="form-control"
                            placeholder="0 - 5"
                            required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">
                                Level
                            </label>

                            <select
                                name="level"
                                class="form-select"
                                required>

                                <option value="">Select Level</option>
                                <option>Beginner</option>
                                <option>Intermediate</option>
                                <option>Advanced</option>

                            </select>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-success w-100">

                            <i class="bi bi-plus-circle-fill"></i>
                            Save Course

                        </button>

                    </form>

                    <div class="text-center mt-4">

                        <a href="{{ url_for('admin.admin') }}"
                           class="btn btn-secondary">

                            <i class="bi bi-arrow-left"></i>
                            Back to Admin

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
