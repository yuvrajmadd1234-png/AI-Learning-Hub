<div class="stat-card">

    <div class="stat-left">

        <div class="stat-icon">
            <i class="bi {{ icon }}"></i>
        </div>

        <div>

            <small>{{ title }}</small>

            <h2>{{ value }}</h2>

        </div>

    </div>

    <div class="trend {{ trend_color }}">

        <i class="bi bi-arrow-up"></i>

        {{ trend }}

    </div>

</div>
